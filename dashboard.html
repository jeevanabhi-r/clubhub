<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ClubHub Dashboard</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white">

<div id="root"></div>

<script type="text/babel">

function Dashboard() {
  const [events, setEvents] = React.useState([]);
  const [view, setView] = React.useState("events");
  const [showForm, setShowForm] = React.useState(false);

  const [title, setTitle] = React.useState("");
  const [desc, setDesc] = React.useState("");

  React.useEffect(() => {
    const user = localStorage.getItem("clubhub_user");
    if (!user) window.location.href = "/";
    loadEvents();
  }, []);

  const loadEvents = () => {
    const data = JSON.parse(localStorage.getItem("events") || "[]");
    setEvents(data);
  };

  const addEvent = () => {
    if (!title) return;

    const newEvent = {
      id: Date.now(),
      title,
      desc
    };

    const updated = [...events, newEvent];
    localStorage.setItem("events", JSON.stringify(updated));

    setTitle("");
    setDesc("");
    setShowForm(false);
    loadEvents();
  };

  const deleteEvent = (id) => {
    const updated = events.filter(e => e.id !== id);
    localStorage.setItem("events", JSON.stringify(updated));
    loadEvents();
  };

  return (
    <div className="flex min-h-screen">

      {/* SIDEBAR */}
      <div className="w-64 bg-gray-900 p-4">

        <h1 className="text-xl font-bold text-orange-500 mb-6">ClubHub</h1>

        <button 
          className="block w-full text-left p-2 hover:bg-gray-800 rounded mb-2"
          onClick={()=>setView("events")}
        >
          📅 Manage Events
        </button>

        <button 
          className="block w-full text-left p-2 hover:bg-gray-800 rounded"
          onClick={()=>setView("profile")}
        >
          👤 My Profile
        </button>

        <button 
          className="mt-10 text-red-400"
          onClick={()=>{
            localStorage.removeItem("clubhub_user");
            window.location.href="/";
          }}
        >
          Logout
        </button>

      </div>

      {/* MAIN */}
      <div className="flex-1 p-6">

        {/* EVENTS VIEW */}
        {view === "events" && (
          <>
            <div className="flex justify-between mb-4">
              <h2 className="text-2xl">Event Management</h2>
              <button 
                className="bg-orange-500 px-4 py-2 rounded"
                onClick={()=>setShowForm(true)}
              >
                + Add Event
              </button>
            </div>

            <div className="grid grid-cols-3 gap-4">
              {events.map(e => (
                <div key={e.id} className="bg-gray-800 p-4 rounded">
                  <h3 className="font-bold">{e.title}</h3>
                  <p className="text-sm text-gray-400">{e.desc}</p>
                  <button 
                    className="mt-2 text-red-400"
                    onClick={()=>deleteEvent(e.id)}
                  >
                    Delete
                  </button>
                </div>
              ))}
            </div>
          </>
        )}

        {/* PROFILE VIEW */}
        {view === "profile" && (
          <div>
            <h2 className="text-2xl mb-4">Profile Settings</h2>
            <div className="bg-gray-800 p-4 rounded w-96">
              <p>Name: Jeevan Abhi</p>
              <p>Email: Stored User</p>
              <button className="mt-4 bg-orange-500 px-4 py-2 rounded">
                Update Profile
              </button>
            </div>
          </div>
        )}

      </div>

      {/* ADD EVENT MODAL */}
      {showForm && (
        <div className="fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center">

          <div className="bg-gray-900 p-6 rounded w-96">

            <h2 className="text-xl mb-4">Create Event</h2>

            <input
              className="text-black p-2 rounded w-full mb-3"
              placeholder="Title"
              value={title}
              onChange={(e)=>setTitle(e.target.value)}
            />

            <textarea
              className="text-black p-2 rounded w-full mb-3"
              placeholder="Description"
              value={desc}
              onChange={(e)=>setDesc(e.target.value)}
            />

            <div className="flex justify-end gap-2">
              <button onClick={()=>setShowForm(false)}>Cancel</button>
              <button className="bg-orange-500 px-4 py-2 rounded" onClick={addEvent}>
                Save
              </button>
            </div>

          </div>

        </div>
      )}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Dashboard />);

</script>

</body>
</html>
