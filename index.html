<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClubHub</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- ✅ Babel (ONLY ONE) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>

<div id="root"></div>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  addDoc 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBozFPbqUn7nTwbjRC027ACfbAakY8ocwE",
  authDomain: "clubhub2-226c0.firebaseapp.com",
  projectId: "clubhub2-226c0",
  storageBucket: "clubhub2-226c0.firebasestorage.app",
  messagingSenderId: "473457215975",
  appId: "1:473457215975:web:17c1eb7278a428be175542"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ Global
window.db = db;
window.collection = collection;
window.getDocs = getDocs;
window.addDoc = addDoc;

console.log("🔥 Firebase Ready");
</script>

<!-- 🔥 React App -->
<script type="text/babel">

function AuthForm({ onLogin }) {
  const [view, setView] = React.useState("login");
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [name, setName] = React.useState("");
  const [msg, setMsg] = React.useState("");

  // LOGIN
  const handleLogin = async (e) => {
    e.preventDefault();

    if (!window.db) {
      setMsg("⏳ Firebase loading...");
      return;
    }

    const snapshot = await window.getDocs(
      window.collection(window.db, "users")
    );

    let foundUser = null;

    snapshot.forEach((doc) => {
      const user = doc.data();
      if (user.email === email && user.password === password) {
        foundUser = user;
      }
    });

    if (foundUser) {
      onLogin(foundUser);
    } else {
      setMsg("❌ Invalid email or password");
    }
  };

  // REGISTER
  const handleRegister = async (e) => {
    e.preventDefault();

    if (!window.db) {
      setMsg("⏳ Firebase loading...");
      return;
    }

    await window.addDoc(
      window.collection(window.db, "users"),
      {
        name,
        email,
        password,
        role: "student"
      }
    );

    setMsg("✅ Registered successfully");
    setView("login");
  };

  return (
    <div className="space-y-4">

      {msg && <p className="text-center text-yellow-400">{msg}</p>}

      {view === "login" && (
        <form onSubmit={handleLogin} className="space-y-3">

          <input className="w-full p-3 rounded bg-gray-800"
            placeholder="Email"
            value={email}
            onChange={(e)=>setEmail(e.target.value)} />

          <input type="password"
            className="w-full p-3 rounded bg-gray-800"
            placeholder="Password"
            value={password}
            onChange={(e)=>setPassword(e.target.value)} />

          <button className="w-full bg-orange-500 p-3 rounded">
            Login
          </button>

          <p className="text-center text-gray-400">
            No account?
            <span onClick={()=>setView("register")}
              className="text-orange-400 ml-1 cursor-pointer">
              Register
            </span>
          </p>

        </form>
      )}

      {view === "register" && (
        <form onSubmit={handleRegister} className="space-y-3">

          <input className="w-full p-3 rounded bg-gray-800"
            placeholder="Name"
            value={name}
            onChange={(e)=>setName(e.target.value)} />

          <input className="w-full p-3 rounded bg-gray-800"
            placeholder="Email"
            value={email}
            onChange={(e)=>setEmail(e.target.value)} />

          <input type="password"
            className="w-full p-3 rounded bg-gray-800"
            placeholder="Password"
            value={password}
            onChange={(e)=>setPassword(e.target.value)} />

          <button className="w-full bg-orange-500 p-3 rounded">
            Register
          </button>

          <p className="text-center text-gray-400">
            Already have account?
            <span onClick={()=>setView("login")}
              className="text-orange-400 ml-1 cursor-pointer">
              Login
            </span>
          </p>

        </form>
      )}

    </div>
  );
}

function App() {
  const [user, setUser] = React.useState(null);

  return (
    <div className="min-h-screen flex items-center justify-center">
      <div className="w-full max-w-md bg-gray-900 p-6 rounded-xl">

        {!user ? (
          <AuthForm onLogin={setUser} />
        ) : (
          <div className="text-center space-y-4">
            <h2 className="text-2xl">Welcome</h2>
            <p className="text-orange-400">{user.name}</p>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
