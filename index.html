<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubHub - Login</title>
    <meta name="description" content="Manage college clubs and events with ClubHub.">

    <!-- ✅ React (use normal CDN, not trickle one) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ✅ Trickle SDK (VERY IMPORTANT FIX) -->
    <script src="https://resource.trickle.so/sdk/trickle.js"></script>

    <!-- UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#f97316',
                        'primary-hover': '#ea580c',
                    }
                }
            }
        }

        // Dark mode default
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
            if (!localStorage.getItem('theme')) localStorage.setItem('theme', 'dark');
        }
    </script>

    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #f97316;
            --primary-hover: #ea580c;
            --bg-color: #fff7ed;
        }
    }
    @layer base {
        body {
            @apply bg-orange-50 dark:bg-black dark:text-gray-100 transition-colors duration-200;
            font-family: 'Inter', sans-serif;
        }
    }
    @layer components {
        .btn-primary {
            @apply w-full bg-[var(--primary-color)] hover:bg-[var(--primary-hover)] text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-200;
        }
        .input-field {
            @apply w-full px-4 py-2 border border-orange-200 rounded-lg focus:ring-2 focus:ring-[var(--primary-color)] focus:border-transparent outline-none transition-all;
        }
    }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- ✅ Correct order -->
    <script type="text/babel" src="components/AuthForm.js"></script>
    <script type="text/babel" src="auth-app.js"></script>
</body>
</html>
