<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClubHub</title>

  <!-- React -->
  <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
  <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>
  <div id="root"></div>


<script type="text/babel" src="./components/AuthForm.js"></script>
<script type="text/babel" src="./auth-app.js"></script>

  <!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  addDoc, 
  updateDoc, 
  doc 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// 🔑 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBozFPbqUn7nTwbjRC027ACfbAakY8ocwE",
  authDomain: "clubhub2-226c0.firebaseapp.com",
  projectId: "clubhub2-226c0",
  storageBucket: "clubhub2-226c0.firebasestorage.app",
  messagingSenderId: "473457215975",
  appId: "1:473457215975:web:17c1eb7278a428be175542"
};

// ✅ Init
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ MAKE GLOBAL (VERY IMPORTANT)
window.db = db;
window.collection = collection;
window.getDocs = getDocs;
window.addDoc = addDoc;
window.updateDoc = updateDoc;
window.doc = doc;

console.log("🔥 Firebase Connected");
</script>
  <script type="text/babel">

function AuthForm({ onLogin }) {
  const [view, setView] = React.useState("login");
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [name, setName] = React.useState("");
  const [msg, setMsg] = React.useState("");

  const handleRegister = async (e) => {
    e.preventDefault();
    try {
      await window.addDoc(window.collection(window.db, "users"), {
        name, email, password
      });
      setMsg("✅ Registered successfully");
      setView("login");
    } catch {
      setMsg("❌ Registration failed");
    }
  };

  const handleLogin = async (e) => {
    e.preventDefault();
    try {
      const snapshot = await window.getDocs(
        window.collection(window.db, "users")
      );

      let foundUser = null;
      snapshot.forEach((doc) => {
        const user = doc.data();
        if (user.email === email && user.password === password) {
          foundUser = user;
        }
      });

      if (foundUser) {
        onLogin(foundUser);
      } else {
        setMsg("❌ Invalid credentials");
      }

    } catch {
      setMsg("❌ Login error");
    }
  };

  return (
    <div className="space-y-4 text-white">

      {msg && <p className="text-center">{msg}</p>}

      {view === "login" && (
        <form onSubmit={handleLogin} className="space-y-3">
          <input className="w-full p-3 bg-gray-800 rounded"
            placeholder="Email"
            value={email}
            onChange={(e)=>setEmail(e.target.value)} />

          <input type="password"
            className="w-full p-3 bg-gray-800 rounded"
            placeholder="Password"
            value={password}
            onChange={(e)=>setPassword(e.target.value)} />

          <button className="w-full bg-orange-500 p-3 rounded">
            Login
          </button>

          <p className="text-center">
            No account?
            <span onClick={()=>setView("register")}
              className="text-orange-400 cursor-pointer ml-1">
              Register
            </span>
          </p>
        </form>
      )}

      {view === "register" && (
        <form onSubmit={handleRegister} className="space-y-3">
          <input className="w-full p-3 bg-gray-800 rounded"
            placeholder="Name"
            value={name}
            onChange={(e)=>setName(e.target.value)} />

          <input className="w-full p-3 bg-gray-800 rounded"
            placeholder="Email"
            value={email}
            onChange={(e)=>setEmail(e.target.value)} />

          <input type="password"
            className="w-full p-3 bg-gray-800 rounded"
            placeholder="Password"
            value={password}
            onChange={(e)=>setPassword(e.target.value)} />

          <button className="w-full bg-orange-500 p-3 rounded">
            Register
          </button>

          <p className="text-center">
            Already have account?
            <span onClick={()=>setView("login")}
              className="text-orange-400 cursor-pointer ml-1">
              Login
            </span>
          </p>
        </form>
      )}
    </div>
  );
}

function App() {
  const [user, setUser] = React.useState(null);

  return (
    <div className="min-h-screen flex items-center justify-center">
      <div className="w-full max-w-md p-6 bg-gray-900 rounded-xl">
        {!user ? (
          <AuthForm onLogin={setUser} />
        ) : (
          <h2>Welcome {user.name}</h2>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
