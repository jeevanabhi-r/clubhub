<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ClubHub</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black flex items-center justify-center h-screen">

<div id="root"></div>

<script type="text/babel">

function AuthForm() {
  const [view, setView] = React.useState("login");
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [name, setName] = React.useState("");
  const [msg, setMsg] = React.useState("");

  const handleLogin = (e) => {
    e.preventDefault();
    const users = JSON.parse(localStorage.getItem("users") || "[]");

    const user = users.find(u => u.email === email && u.password === password);

    if (user) {
      localStorage.setItem("clubhub_user", JSON.stringify(user));
      window.location.href = "dashboard.html";
    } else {
      setMsg("Invalid email or password");
    }
  };

  const handleRegister = (e) => {
    e.preventDefault();
    const users = JSON.parse(localStorage.getItem("users") || "[]");

    if (users.find(u => u.email === email)) {
      setMsg("User already exists");
      return;
    }

    users.push({ name, email, password });
    localStorage.setItem("users", JSON.stringify(users));

    setMsg("Registered successfully! Login now");
    setView("login");
  };

  return (
    <div className="bg-gray-900 p-8 rounded-2xl w-96 shadow-2xl border border-gray-800">

      {/* Title */}
      <h1 className="text-2xl font-bold text-center text-orange-500 mb-2">
        ClubHub
      </h1>
      <p className="text-center text-gray-400 mb-6">
        College Clubs & Events
      </p>

      {msg && <p className="text-red-400 text-sm mb-3 text-center">{msg}</p>}

      {view === "login" ? (
        <form onSubmit={handleLogin}>

          <input
            className="w-full p-3 mb-3 rounded-lg bg-gray-800 text-white border border-gray-700 focus:border-orange-500 outline-none"
            placeholder="Email"
            onChange={(e)=>setEmail(e.target.value)}
          />

          <input
            type="password"
            className="w-full p-3 mb-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:border-orange-500 outline-none"
            placeholder="Password"
            onChange={(e)=>setPassword(e.target.value)}
          />

          <button className="w-full bg-orange-500 hover:bg-orange-600 p-3 rounded-lg font-semibold transition">
            Login
          </button>

          <p className="text-center text-gray-400 mt-4 text-sm">
            Don't have an account?{" "}
            <span className="text-orange-500 cursor-pointer" onClick={()=>setView("register")}>
              Register
            </span>
          </p>

        </form>
      ) : (
        <form onSubmit={handleRegister}>

          <input
            className="w-full p-3 mb-3 rounded-lg bg-gray-800 text-white border border-gray-700 focus:border-orange-500 outline-none"
            placeholder="Name"
            onChange={(e)=>setName(e.target.value)}
          />

          <input
            className="w-full p-3 mb-3 rounded-lg bg-gray-800 text-white border border-gray-700 focus:border-orange-500 outline-none"
            placeholder="Email"
            onChange={(e)=>setEmail(e.target.value)}
          />

          <input
            type="password"
            className="w-full p-3 mb-4 rounded-lg bg-gray-800 text-white border border-gray-700 focus:border-orange-500 outline-none"
            placeholder="Password"
            onChange={(e)=>setPassword(e.target.value)}
          />

          <button className="w-full bg-orange-500 hover:bg-orange-600 p-3 rounded-lg font-semibold transition">
            Register
          </button>

          <p className="text-center text-gray-400 mt-4 text-sm">
            Already have an account?{" "}
            <span className="text-orange-500 cursor-pointer" onClick={()=>setView("login")}>
              Login
            </span>
          </p>

        </form>
      )}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AuthForm />);

</script>

</body>
</html>
