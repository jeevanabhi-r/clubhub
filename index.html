<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubHub - Login</title>
    <meta name="description" content="Manage college clubs and events with ClubHub.">
    
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#f97316',
                        'primary-hover': '#ea580c',
                    }
                }
            }
        }
        // Default to dark mode for black interface
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
            if (!localStorage.getItem('theme')) localStorage.setItem('theme', 'dark');
        }
    </script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #f97316; /* orange-500 */
            --primary-hover: #ea580c; /* orange-600 */
            --bg-color: #fff7ed;      /* orange-50 */
        }
    }
    @layer base {
        body {
            @apply bg-orange-50 dark:bg-black dark:text-gray-100 transition-colors duration-200;
            font-family: 'Inter', sans-serif;
        }
    }
    @layer components {
        .btn-primary {
            @apply w-full bg-[var(--primary-color)] hover:bg-[var(--primary-hover)] text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-200;
        }
        .input-field {
            @apply w-full px-4 py-2 border border-orange-200 rounded-lg focus:ring-2 focus:ring-[var(--primary-color)] focus:border-transparent outline-none transition-all;
        }
    }
    </style>
    <style>
        /* Hide "Built with Trickle" badge */
        a[href*="trickle"], 
        div:has(a[href*="trickle"]) {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="components/AuthForm.js"></script>
    <script type="text/babel" src="auth-app.js"></script>
</body>
</html>
