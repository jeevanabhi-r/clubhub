<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClubHub</title>

  <!-- React -->
  <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
  <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- ✅ Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      addDoc
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBozFPbqUn7nTwbjRC027ACfbAakY8ocwE",
      authDomain: "clubhub2-226c0.firebaseapp.com",
      projectId: "clubhub2-226c0",
      storageBucket: "clubhub2-226c0.firebasestorage.app",
      messagingSenderId: "473457215975",
      appId: "1:473457215975:web:17c1eb7278a428be175542"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.collection = collection;
    window.getDocs = getDocs;
    window.addDoc = addDoc;

    console.log("🔥 Firebase Connected");
  </script>

  <!-- ✅ React App -->
  <script type="text/babel">

    function AuthForm() {
      const [view, setView] = React.useState("login");
      const [email, setEmail] = React.useState("");
      const [password, setPassword] = React.useState("");
      const [name, setName] = React.useState("");
      const [msg, setMsg] = React.useState("");

      // REGISTER
      const handleRegister = async (e) => {
        e.preventDefault();

        try {
          await window.addDoc(window.collection(window.db, "users"), {
            name,
            email,
            password
          });

          setMsg("✅ Registered successfully");
          setView("login");
        } catch (err) {
          console.error(err);
          setMsg("❌ Registration failed");
        }
      };

      // LOGIN
      const handleLogin = async (e) => {
        e.preventDefault();

        try {
          const snapshot = await window.getDocs(
            window.collection(window.db, "users")
          );

          let found = false;

          snapshot.forEach((doc) => {
            const user = doc.data();
            if (user.email === email && user.password === password) {
              found = true;
            }
          });

          if (found) {
            setMsg("✅ Login successful");
          } else {
            setMsg("❌ Invalid credentials");
          }

        } catch (err) {
          console.error(err);
          setMsg("❌ Login error");
        }
      };

      return (
        <div className="space-y-4">

          <h2 className="text-xl text-center">
            {view === "login" ? "Login" : "Register"}
          </h2>

          {msg && <p className="text-yellow-400 text-center">{msg}</p>}

          {view === "login" && (
            <form onSubmit={handleLogin} className="space-y-3">

              <input
                type="email"
                placeholder="Email"
                className="w-full p-3 rounded bg-gray-800"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
              />

              <input
                type="password"
                placeholder="Password"
                className="w-full p-3 rounded bg-gray-800"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
              />

              <button className="w-full bg-orange-500 p-3 rounded">
                Login
              </button>

              <p className="text-center text-gray-400">
                No account?
                <button
                  type="button"
                  onClick={() => setView("register")}
                  className="text-orange-400 ml-1"
                >
                  Register
                </button>
              </p>

            </form>
          )}

          {view === "register" && (
            <form onSubmit={handleRegister} className="space-y-3">

              <input
                type="text"
                placeholder="Name"
                className="w-full p-3 rounded bg-gray-800"
                value={name}
                onChange={(e) => setName(e.target.value)}
              />

              <input
                type="email"
                placeholder="Email"
                className="w-full p-3 rounded bg-gray-800"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
              />

              <input
                type="password"
                placeholder="Password"
                className="w-full p-3 rounded bg-gray-800"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
              />

              <button className="w-full bg-orange-500 p-3 rounded">
                Register
              </button>

              <p className="text-center text-gray-400">
                Already have account?
                <button
                  type="button"
                  onClick={() => setView("login")}
                  className="text-orange-400 ml-1"
                >
                  Login
                </button>
              </p>

            </form>
          )}

        </div>
      );
    }

    function App() {
      return (
        <div className="min-h-screen flex items-center justify-center">
          <div className="w-full max-w-md p-6 bg-gray-900 rounded-xl">
            <h1 className="text-2xl text-center mb-4">ClubHub</h1>
            <AuthForm />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>

</body>
</html>
