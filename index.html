<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ClubHub</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black flex items-center justify-center h-screen text-white">

<div id="root"></div>

<script type="text/babel">

function AuthForm() {
  const [view, setView] = React.useState("login");
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [name, setName] = React.useState("");
  const [msg, setMsg] = React.useState("");

  const handleLogin = (e) => {
    e.preventDefault();
    const users = JSON.parse(localStorage.getItem("users") || "[]");

    const user = users.find(u => u.email === email && u.password === password);

    if (user) {
      localStorage.setItem("clubhub_user", JSON.stringify(user));
      window.location.href = "dashboard.html";
    } else {
      setMsg("Invalid login");
    }
  };

  const handleRegister = (e) => {
    e.preventDefault();
    const users = JSON.parse(localStorage.getItem("users") || "[]");

    if (users.find(u => u.email === email)) {
      setMsg("User exists");
      return;
    }

    users.push({ name, email, password });
    localStorage.setItem("users", JSON.stringify(users));

    setMsg("Registered! Login now");
    setView("login");
  };

  return (
    <div className="bg-gray-900 p-6 rounded w-80">
      <h2 className="text-xl mb-4">{view}</h2>
      {msg && <p>{msg}</p>}

      {view === "login" ? (
        <form onSubmit={handleLogin}>
          <input className="w-full p-2 mb-2 text-black" placeholder="Email" onChange={e=>setEmail(e.target.value)} />
          <input type="password" className="w-full p-2 mb-2 text-black" placeholder="Password" onChange={e=>setPassword(e.target.value)} />
          <button className="bg-orange-500 w-full p-2">Login</button>
          <p onClick={()=>setView("register")}>Register</p>
        </form>
      ) : (
        <form onSubmit={handleRegister}>
          <input className="w-full p-2 mb-2 text-black" placeholder="Name" onChange={e=>setName(e.target.value)} />
          <input className="w-full p-2 mb-2 text-black" placeholder="Email" onChange={e=>setEmail(e.target.value)} />
          <input type="password" className="w-full p-2 mb-2 text-black" placeholder="Password" onChange={e=>setPassword(e.target.value)} />
          <button className="bg-orange-500 w-full p-2">Register</button>
          <p onClick={()=>setView("login")}>Login</p>
        </form>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AuthForm />);

</script>

</body>
</html>
